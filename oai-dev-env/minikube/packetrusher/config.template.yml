# PacketRusher lab template for the minikube OAI dev environment.
# Replace the placeholders below, or render this file with:
#   oai-dev-env/minikube/scripts/render-packetrusher-config.sh --bind-ip <reachable-ip>
#
# `--dedicatedGnb` increments the N2 and N3 IPs sequentially, so reserve a
# contiguous block of addresses starting at __PACKETRUSHER_BIND_IP__.

gnodeb:
  controlif:
    ip: "__PACKETRUSHER_BIND_IP__"
    port: 9487

  dataif:
    ip: "__PACKETRUSHER_BIND_IP__"
    port: 2152

  plmnlist:
    mcc: "001"
    mnc: "01"
    tac: "000001"
    gnbid: "000008"

  slicesupportlist:
    sst: "01"
    sd: "FFFFFF"

ue:
  hplmn:
    mcc: "001"
    mnc: "01"
  msin: "0000000100"

  routingindicator: "0000"
  protectionScheme: 0
  homeNetworkPublicKey: "5a8d38864820197c3394b92613b20b91633cbd897119273bf8e4a6f4eec0a650"
  homeNetworkPublicKeyID: 1

  key: "fec86ba6eb707ed08905757b1bb44b8f"
  opc: "c42449363bbad02b66d16bc975d77cc1"
  amf: "8000"
  sqn: "00000000"

  dnn: "oai"
  snssai:
    sst: "01"
    sd: "FFFFFF"

  integrity:
    nia0: false
    nia1: false
    nia2: true
    nia3: false
  ciphering:
    nea0: true
