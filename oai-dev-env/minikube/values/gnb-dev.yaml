# SPDX-License-Identifier: MIT
# Legacy file: the current dev workflow uses external PacketRusher instead of the in-cluster gNB release.

global:
  waitForAMF: true

imagePullSecrets: []

nfimage:
  repository: docker.io/oaisoftwarealliance/oai-gnb
  version: develop
  pullPolicy: IfNotPresent

multus:
  enabled: false

config:
  timeZone: Europe/Paris
  useAdditionalOptions: "-E --rfsim --log_config.global_log_options level,nocolor,time"
  gnbName: oai-gnb
  gdbstack: 1
  radio: rfsim
  enableE2: false
  amfHost: oai-amf
  tac: 1
  plmn_list:
    - mcc: 001
      mnc: 01
      mnc_length: 2
      snssaiList:
        - sst: "1"
          sd: "0xffffff"

start:
  gnb: true
  tcpdump: false
