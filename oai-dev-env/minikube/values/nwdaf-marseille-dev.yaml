# SPDX-License-Identifier: MIT

global:
  nameSuffix: -region-marseille
  region: region-marseille
  tac: "000003"
  nrf:
    url: http://oai-nrf:80
  amf:
    url: http://oai-amf
    httpVersion: "2"
  smf:
    url: http://oai-smf
    httpVersion: "2"
  mongodb:
    uri: mongodb://oai-nwdaf-database-region-marseille:27017
    databaseName: testing-region-marseille
  sbi:
    eventNotifyUri: http://oai-nwdaf-sbi-region-marseille:8080

gateway:
  host: oai-nwdaf-nbi-gateway-region-marseille
  service:
    type: ClusterIP

engine:
  image:
    repository: local/oai-nwdaf-engine
    tag: dev
    pullPolicy: Never

nbiAnalytics:
  image:
    repository: local/oai-nwdaf-nbi-analytics
    tag: dev
    pullPolicy: Never

nbiEvents:
  image:
    repository: local/oai-nwdaf-nbi-events
    tag: dev
    pullPolicy: Never

nbiMl:
  image:
    repository: local/oai-nwdaf-nbi-ml
    tag: dev
    pullPolicy: Never

sbi:
  image:
    repository: local/oai-nwdaf-sbi
    tag: dev
    pullPolicy: Never

mtlf:
  image:
    repository: local/oai-nwdaf-mtlf
    tag: dev
    pullPolicy: Never
  service:
    name: oai-nwdaf-mtlf-region-marseille
  nf:
    instanceId: 22222222-2222-4222-8222-222222222203
  testStubModel:
    enabled: true
    modelId: region-marseille-stub-latest
    jobId: region-marseille-stub-latest-job
    weightBytes: 4096
    notifyExistingOnSubscribe: true

dccf:
  image:
    repository: local/oai-nwdaf-dccf
    tag: dev
    pullPolicy: Never
  service:
    name: oai-nwdaf-dccf-region-marseille
  nf:
    instanceId: 22222222-2222-4222-8222-222222222103
