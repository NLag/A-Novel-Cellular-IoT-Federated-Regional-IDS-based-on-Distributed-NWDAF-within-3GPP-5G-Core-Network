apiVersion: v1
kind: Pod
metadata:
  name: oai-5g-storage-bootstrap
  namespace: oai-5g-core
spec:
  restartPolicy: Never
  containers:
    - name: bootstrap
      image: busybox:1.36
      command:
        - sleep
        - "3600"
      volumeMounts:
        - name: storage
          mountPath: /oai-5g-storage
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: oai-5g-storage
