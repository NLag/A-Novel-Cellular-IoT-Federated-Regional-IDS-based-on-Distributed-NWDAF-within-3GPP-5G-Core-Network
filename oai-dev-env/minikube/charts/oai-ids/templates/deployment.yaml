        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.waitForNrf.enabled }}
      initContainers:
        - name: wait-for-nrf
          image: docker.io/oaisoftwarealliance/oai-tcpdump-init:alpine-3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until ncat -zv {{ .Values.waitForNrf.host }} {{ .Values.waitForNrf.port }}; do echo waiting for NRF; sleep 1; done
      {{- end }}
      containers:
        - name: ids
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: IDS_CONFIG_PATH
              value: /app/config/ids.yaml
            - name: IDS_INSTANCE_ID
