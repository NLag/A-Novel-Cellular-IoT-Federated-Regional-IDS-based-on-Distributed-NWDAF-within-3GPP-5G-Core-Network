log_level:
  general: info

register_nf:
  general: yes

http_version: 2
curl_timeout: 6000

ids:
  enabled: yes
  host: oai-ids
  packet_mtu: 1500
  gtpu:
    port: 2152
    teid: 0x00F00D01

snssais:
  - &oai_default_slice
    sst: 1
    sd: "FFFFFF"

nfs:
  amf:
    host: oai-amf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
    n2:
      interface_name: eth0
      port: 38412
  smf:
    host: oai-smf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
    n4:
      interface_name: eth0
      port: 8805
  lmf:
    host: oai-lmf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  upf:
    host: oai-upf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
    n3:
      interface_name: eth0
      port: 2152
    n4:
      interface_name: eth0
      port: 8805
    n6:
      interface_name: eth0
    n9:
      interface_name: eth0
      port: 2152
  udm:
    host: oai-udm
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  udr:
    host: oai-udr
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  ausf:
    host: oai-ausf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  nrf:
    host: oai-nrf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  nssf:
    host: oai-nssf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0
  pcf:
    host: oai-pcf
    sbi:
      port: 80
      api_version: v1
      interface_name: eth0

database:
  host: mysql
  user: test
  type: mysql
  password: test
  database_name: oai_db
  generate_random: true
  connection_timeout: 300

amf:
  amf_name: "OAI-AMF"
  support_features_options:
    enable_simple_scenario: no
    enable_nssf: yes
    enable_smf_selection: yes
  relative_capacity: 30
  statistics_timer_interval: 20
  emergency_support: false
  served_guami_list:
    - mcc: 001
      mnc: 01
      amf_region_id: 01
      amf_set_id: 001
      amf_pointer: 01
  plmn_support_list:
    - mcc: 001
      mnc: 01
      tac: 0x0001
      nssai:
        - *oai_default_slice
    - mcc: 001
      mnc: 01
      tac: 0x0002
      nssai:
        - *oai_default_slice
    - mcc: 001
      mnc: 01
      tac: 0x0003
      nssai:
        - *oai_default_slice
    - mcc: 001
      mnc: 01
      tac: 0x0004
      nssai:
        - *oai_default_slice
    - mcc: 001
      mnc: 01
      tac: 0x0005
      nssai:
        - *oai_default_slice
  supported_integrity_algorithms:
    - NIA1
    - NIA2
  supported_encryption_algorithms:
    - NEA0
    - NEA1
    - NEA2

smf:
  ue_mtu: 1500
  support_features:
    use_local_subscription_info: no
    use_local_pcc_rules: yes
  upfs:
    - host: oai-upf
      config:
        enable_usage_reporting: no
  ue_dns:
    primary_ipv4: "8.8.8.8"
    primary_ipv6: "2001:4860:4860::8888"
    secondary_ipv4: "8.8.4.4"
    secondary_ipv6: "2001:4860:4860::8844"
  smf_info:
    sNssaiSmfInfoList:
      - sNssai: *oai_default_slice
        dnnSmfInfoList:
          - dnn: oai
  local_subscription_infos:
    - single_nssai: *oai_default_slice
      dnn: oai
      qos_profile:
        5qi: 9
        session_ambr_ul: "200Mbps"
        session_ambr_dl: "400Mbps"

lmf:
  http_threads_count: 8
  gnb_id_bits_count: 28
  num_gnb: 1
  trp_info_wait_ms: 10000
  positioning_wait_ms: 10000
  measurement_wait_ms: 10000
  support_features:
    request_trp_info: no
    determine_num_gnb: yes
    use_http2: yes
    use_fqdn_dns: no
    register_nrf: yes

upf:
  support_features:
    enable_bpf_datapath: no
    enable_snat: yes
  remote_n6_gw: localhost
  upf_info:
    sNssaiUpfInfoList:
      - sNssai: *oai_default_slice
        dnnUpfInfoList:
          - dnn: oai

nssf:
  slice_config_path: /openair-nssf/etc/nssf_slice_config.yaml

dnns:
  - dnn: oai
    pdu_session_type: IPV4
    ipv4_subnet: 12.1.0.0/16
