{{- $suffix := default "" .Values.global.nameSuffix }}
{{- $databaseName := printf "oai-nwdaf-database%s" $suffix }}
{{- $gatewayName := printf "oai-nwdaf-nbi-gateway%s" $suffix }}
{{- $kongConfigName := printf "kong-config%s" $suffix }}
{{- $engineName := printf "oai-nwdaf-engine%s" $suffix }}
{{- $nbiAnalyticsName := printf "oai-nwdaf-nbi-analytics%s" $suffix }}
{{- $nbiEventsName := printf "oai-nwdaf-nbi-events%s" $suffix }}
{{- $nbiMlName := printf "oai-nwdaf-nbi-ml%s" $suffix }}
{{- $sbiName := printf "oai-nwdaf-sbi%s" $suffix }}
{{- $mtlfName := printf "oai-nwdaf-mtlf%s" $suffix }}
{{- $dccfName := printf "oai-nwdaf-dccf%s" $suffix }}
{{- $mtlfServiceName := default (printf "oai-nwdaf-mtlf-service%s" $suffix) .Values.mtlf.service.name }}
{{- $dccfServiceName := default $dccfName .Values.dccf.service.name }}
{{- $mtlfConfigName := printf "oai-nwdaf-mtlf-config%s" $suffix }}
{{- $dccfConfigName := printf "oai-nwdaf-dccf-config%s" $suffix }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $databaseName }}
  labels:
    app: {{ $databaseName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ $databaseName }}
  template:
    metadata:
      labels:
        app: {{ $databaseName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        nwdaf.oai/region: {{ .Values.global.region | quote }}
        nwdaf.oai/tac: {{ .Values.global.tac | quote }}
      annotations:
        dev.oai/component-rollout-nonce: {{ .Values.database.rolloutNonce | quote }}
    spec:
      {{- include "oai-nwdaf-dev.podImagePullSecrets" . | nindent 6 }}
      containers:
        - name: oai-nwdaf-database
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.database.port }}
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $databaseName }}
  labels:
    app: {{ $databaseName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $databaseName }}
  ports:
    - protocol: TCP
      port: {{ .Values.database.port }}
      targetPort: {{ .Values.database.port }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $kongConfigName }}
  labels:
    app: {{ $gatewayName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
data:
  kong.yml: |
    _format_version: '1.1'
    _transform: true

    services:
    - name: {{ $nbiAnalyticsName }}
      url: http://{{ $nbiAnalyticsName }}:{{ .Values.nbiAnalytics.port }}/nnwdaf-analyticsinfo/v1/analytics
      routes:
        - name: oai-nwdaf-nbi-analytics-route
          hosts:
          - {{ .Values.gateway.host }}
          paths:
          - /nnwdaf-analyticsinfo/v1/analytics

    - name: {{ $nbiEventsName }}
      url: http://{{ $nbiEventsName }}:{{ .Values.nbiEvents.port }}/nnwdaf-eventssubscription/v1
      routes:
        - name: oai-nwdaf-nbi-events-route
          hosts:
          - {{ .Values.gateway.host }}
          paths:
          - /nnwdaf-eventssubscription/v1

    - name: {{ $nbiMlName }}
      url: http://{{ $nbiMlName }}:{{ .Values.nbiMl.port }}/nnwdaf-mlmodelprovision/v1
      routes:
        - name: oai-nwdaf-nbi-ml-route
          hosts:
          - {{ .Values.gateway.host }}
          paths:
          - /nnwdaf-mlmodelprovision/v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $gatewayName }}
  labels:
    app: {{ $gatewayName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ $gatewayName }}
  template:
    metadata:
      labels:
        app: {{ $gatewayName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        nwdaf.oai/region: {{ .Values.global.region | quote }}
        nwdaf.oai/tac: {{ .Values.global.tac | quote }}
      annotations:
        dev.oai/component-rollout-nonce: {{ .Values.gateway.rolloutNonce | quote }}
    spec:
      {{- include "oai-nwdaf-dev.podImagePullSecrets" . | nindent 6 }}
      containers:
        - name: oai-nwdaf-nbi-gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: 8000
            - containerPort: 8443
            - containerPort: 8001
          env:
            - name: KONG_ADMIN_LISTEN
              value: 0.0.0.0:8001
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong.yml
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            - name: KONG_PROXY_LISTEN_SSL
              value: 0.0.0.0:8443
          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative
      volumes:
        - name: kong-config
          configMap:
            name: {{ $kongConfigName }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $gatewayName }}
  labels:
    app: {{ $gatewayName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app: {{ $gatewayName }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.gateway.service.httpPort }}
      targetPort: 8000
      {{- if eq .Values.gateway.service.type "NodePort" }}
      nodePort: {{ .Values.gateway.service.nodePorts.http }}
      {{- end }}
    - name: https
      protocol: TCP
      port: {{ .Values.gateway.service.httpsPort }}
      targetPort: 8443
      {{- if eq .Values.gateway.service.type "NodePort" }}
      nodePort: {{ .Values.gateway.service.nodePorts.https }}
      {{- end }}
    - name: admin
      protocol: TCP
      port: {{ .Values.gateway.service.adminPort }}
      targetPort: 8001
      {{- if eq .Values.gateway.service.type "NodePort" }}
      nodePort: {{ .Values.gateway.service.nodePorts.admin }}
      {{- end }}
---
