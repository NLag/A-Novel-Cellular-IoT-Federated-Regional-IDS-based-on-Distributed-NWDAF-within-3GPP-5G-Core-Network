    ndccf:
      port: {{ .Values.dccf.port }}
      database_path: "/data/casmella.db"
    mongodb:
      enabled: true
      uri: {{ .Values.global.mongodb.uri | quote }}
      database_name: {{ .Values.global.mongodb.databaseName | quote }}
      ids_reports_collection: {{ .Values.global.mongodb.collectionNameIdsReports | quote }}
      timeout_ms: 3000
    dccf:
      callback_uri: {{ printf "http://%s:%v" $dccfServiceName .Values.dccf.port | quote }}
    nf_subscriptions:
      enabled: {{ .Values.dccf.nfSubscriptions.enabled }}
      use_http2: {{ .Values.dccf.nfSubscriptions.useHttp2 }}
      amf:
        enabled: {{ .Values.dccf.nfSubscriptions.amfEnabled }}
        endpoint: {{ .Values.global.amf.url | quote }}
      smf:
        enabled: {{ .Values.dccf.nfSubscriptions.smfEnabled }}
        endpoint: {{ .Values.global.smf.url | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $mtlfName }}
  labels:
    app: {{ $mtlfName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ $mtlfName }}
  template:
    metadata:
      labels:
        app: {{ $mtlfName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        nwdaf.oai/region: {{ .Values.global.region | quote }}
        nwdaf.oai/tac: {{ .Values.global.tac | quote }}
      annotations:
        dev.oai/component-rollout-nonce: {{ .Values.mtlf.rolloutNonce | quote }}
    spec:
      {{- include "oai-nwdaf-dev.podImagePullSecrets" . | nindent 6 }}
      containers:
        - name: oai-nwdaf-mtlf
          image: "{{ .Values.mtlf.image.repository }}:{{ .Values.mtlf.image.tag }}"
          imagePullPolicy: {{ .Values.mtlf.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mtlf.port }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MTLF_PORT
              value: {{ .Values.mtlf.port | quote }}
          volumeMounts:
            - name: mtlf-config
              mountPath: /config/mtlf-config.yaml
              subPath: mtlf-config.yaml
              readOnly: true
            - name: mtlf-models
              mountPath: /models
            - name: mtlf-workspace
              mountPath: /workspace
            {{- include "oai-nwdaf-dev.sharedStorageMount" . | nindent 12 }}
            {{- if .Values.mtlf.storage.trainingCode.existingClaim }}
            - name: mtlf-training-code
              mountPath: {{ .Values.mtlf.storage.trainingCode.mountPath | quote }}
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mtlf.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.mtlf.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mtlf-config
          configMap:
            name: {{ $mtlfConfigName }}
        - name: mtlf-models
          {{- if .Values.mtlf.storage.models.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.mtlf.storage.models.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: mtlf-workspace
          {{- if .Values.mtlf.storage.workspace.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.mtlf.storage.workspace.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- include "oai-nwdaf-dev.sharedStorageVolume" . | nindent 8 }}
        {{- if .Values.mtlf.storage.trainingCode.existingClaim }}
        - name: mtlf-training-code
          persistentVolumeClaim:
            claimName: {{ .Values.mtlf.storage.trainingCode.existingClaim | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $mtlfServiceName }}
  labels:
    app: {{ $mtlfName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $mtlfName }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.mtlf.port }}
      targetPort: {{ .Values.mtlf.port }}
