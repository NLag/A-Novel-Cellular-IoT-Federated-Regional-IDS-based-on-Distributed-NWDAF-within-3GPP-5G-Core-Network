apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $mtlfConfigName }}
  labels:
    app: {{ $mtlfName }}
    {{- include "oai-nwdaf-dev.labels" . | nindent 4 }}
data:
  mtlf-config.yaml: |
    mtlf:
      nfInstanceId: {{ .Values.mtlf.nf.instanceId | quote }}
      nfType: "NWDAF"
      ipv4Address: ""
      nfServices:
        - serviceInstanceId: "nnwdaf-mlmodelprovision-001"
          serviceName: "nnwdaf-mlmodelprovision"
          versions:
            - apiVersionInUri: "v1"
              apiFullVersion: "1.0.0"
          scheme: "http"
          ipEndPoints:
            - ipv4Address: ""
              port: {{ .Values.mtlf.port }}
    serving_area:
      region: {{ .Values.global.region | quote }}
      tac: {{ .Values.global.tac | quote }}
    nrf:
      endpoint: {{ .Values.global.nrf.url | quote }}
      auto_register: {{ .Values.mtlf.nrf.autoRegister }}
      heartbeat_interval: {{ .Values.mtlf.nrf.heartbeatInterval }}
    server:
      port: {{ .Values.mtlf.port }}
      api_version: "v1"
    dccf:
      endpoint: {{ printf "http://%s:%v" $dccfServiceName .Values.dccf.port | quote }}
      notification_uri: {{ printf "http://%s:%v/mtlf-internal/dccf-notifications" $mtlfServiceName .Values.mtlf.port | quote }}
      event_types:
{{- range .Values.mtlf.dccf.eventTypes }}
        - {{ . | quote }}
{{- end }}
      protocols:
{{- range .Values.mtlf.dccf.protocols }}
        - {{ . | quote }}
{{- end }}
      notification_interval: {{ .Values.mtlf.dccf.notificationInterval }}
    training:
      script_path: {{ .Values.mtlf.training.scriptPath | quote }}
      models_dir: {{ .Values.mtlf.training.modelsDir | quote }}
      default_epochs: {{ .Values.mtlf.training.defaultEpochs }}
      python_bin: {{ .Values.mtlf.training.pythonBin | quote }}
      pass_output_dir_args: {{ .Values.mtlf.training.passOutputDirArgs }}
      working_dir: {{ .Values.mtlf.training.workingDir | quote }}
      research_workspace: {{ .Values.mtlf.training.researchWorkspace | quote }}
      normalized_package: {{ .Values.mtlf.training.normalizedPackage | quote }}
    training_scenario:
      scenario: {{ .Values.mtlf.trainingScenario.scenario | quote }}
      model_architecture: {{ .Values.mtlf.trainingScenario.modelArchitecture | quote }}
      model_architectures:
{{- range $name, $params := .Values.mtlf.trainingScenario.modelArchitectures }}
        {{ $name }}:
{{- if $params }}
{{ toYaml $params | nindent 10 }}
{{- else }}
          {}
{{- end }}
{{- end }}
      working_dir: {{ .Values.mtlf.trainingScenario.workingDir | quote }}
      research_workspace: {{ .Values.mtlf.trainingScenario.researchWorkspace | quote }}
      normalized_package: {{ .Values.mtlf.trainingScenario.normalizedPackage | quote }}
      pass_output_dir_args: {{ .Values.mtlf.trainingScenario.passOutputDirArgs }}
      record_outputs: {{ .Values.mtlf.trainingScenario.recordOutputs }}
      max_recorded_files: {{ .Values.mtlf.trainingScenario.maxRecordedFiles }}
      metadata_exclude_dirs:
{{- range .Values.mtlf.trainingScenario.metadataExcludeDirs }}
        - {{ . | quote }}
{{- end }}
      scripts:
{{- range $name, $path := .Values.mtlf.trainingScenario.scripts }}
        {{ $name }}: {{ $path | quote }}
{{- end }}
    shared_storage:
      root: {{ .Values.global.sharedStorage.mountPath | quote }}
      metadata_enabled: true
    mongodb:
      enabled: true
      uri: {{ .Values.global.mongodb.uri | quote }}
      database_name: {{ .Values.global.mongodb.databaseName | quote }}
      storage_metadata_collection: {{ .Values.global.mongodb.collectionNameStorageMetadata | quote }}
      timeout_ms: 3000
    test_stub_model:
      enabled: {{ .Values.mtlf.testStubModel.enabled }}
      model_id: {{ .Values.mtlf.testStubModel.modelId | quote }}
      job_id: {{ .Values.mtlf.testStubModel.jobId | quote }}
      weight_bytes: {{ .Values.mtlf.testStubModel.weightBytes }}
      notify_existing_on_subscribe: {{ .Values.mtlf.testStubModel.notifyExistingOnSubscribe }}
    callback_uri: {{ printf "http://%s:%v" $mtlfServiceName .Values.mtlf.port | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
