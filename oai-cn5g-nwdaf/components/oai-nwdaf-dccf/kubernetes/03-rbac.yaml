---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: casmella-controller
  namespace: oai-tutorial
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: casmella-agent
  namespace: oai-tutorial
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: casmella-controller-role
rules:
  # Pod discovery and monitoring
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Deployments/ReplicaSets for pod owner info
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Custom Resources
  - apiGroups: ["casmella.com"]
    resources: ["topologies", "hooklists", "fiveqiinfos"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: casmella-agent-role
rules:
  # Read custom resources
  - apiGroups: ["casmella.com"]
    resources: ["topologies", "hooklists", "fiveqiinfos"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: casmella-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: casmella-controller-role
subjects:
  - kind: ServiceAccount
    name: casmella-controller
    namespace: oai-tutorial
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: casmella-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: casmella-agent-role
subjects:
  - kind: ServiceAccount
    name: casmella-agent
    namespace: oai-tutorial