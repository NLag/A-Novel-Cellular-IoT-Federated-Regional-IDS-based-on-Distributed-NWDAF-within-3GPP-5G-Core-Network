version: '3.8'

services:
  # NWDAF-DCCF Agent (with eBPF monitoring)
  oai-nwdaf-dccf-agent:
    container_name: oai-nwdaf-dccf-agent
    build:
      context: ../
      dockerfile: docker/Dockerfile
    image: oai-nwdaf-dccf:latest
    
    # Required for eBPF
    privileged: true
    network_mode: "host"
    
    # Mount kernel resources
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/agent-config.yaml:/config/agent-config.yaml:ro
      - ./config/dccf-config.yaml:/config/dccf-config.yaml:ro
      - ./config/openapi-operations.yaml:/config/openapi-operations.yaml:ro
    
    # Capabilities for eBPF
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - BPF
      - PERFMON
      - SYS_RESOURCE
    
    environment:
      - MY_NODE_NAME=docker-host
      - NRF_URL=http://192.168.70.130:80
      - DCCF_IP=192.168.70.160
      - PYTHONUNBUFFERED=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Casmella Controller (Pod/Container Discovery)
  casmella-controller:
    container_name: casmella-controller
    build:
      context: ../
      dockerfile: docker/Dockerfile.controller
    image: casmella-controller:latest
    
    network_mode: "host"
    
    volumes:
      - ./config/controller-config.yaml:/config/controller-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9950/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    depends_on:
      - oai-nwdaf-dccf-agent

  # Service Dependency Graph (SDG)
  casmella-sdg:
    container_name: casmella-sdg
    build:
      context: ../
      dockerfile: docker/Dockerfile.sdg
    image: casmella-sdg:latest
    
    ports:
      - "8080:80"
    
    volumes:
      - ./config/sdg-config.yaml:/config/sdg-config.yaml:ro
    
    environment:
      - PYTHONUNBUFFERED=1
      - PROM_ADDRESS=localhost:9950
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    depends_on:
      - oai-nwdaf-dccf-agent

networks:
  default:
    name: oai-nwdaf-network